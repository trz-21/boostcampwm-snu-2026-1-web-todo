<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>
  <link rel="stylesheet" href="todo.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="header__title">My Todo</h1>
      <p class="header__date" id="today-date"></p>
    </header>

    <main class="main">
      <form class="input-form" id="todo-form" aria-label="새 할일 추가">
        <input
          class="input-form__field"
          id="todo-input"
          type="text"
          placeholder="새로운 할 일을 입력하세요"
          aria-label="할일 입력"
          autocomplete="off"
          maxlength="100"
        />
        <button class="input-form__btn" type="submit" aria-label="추가">
          <span aria-hidden="true">+</span>
        </button>
      </form>

      <section class="todo-section" aria-label="할일 목록">
        <div class="todo-stats" id="todo-stats" aria-live="polite"></div>
        <ul class="todo-list" id="todo-list" role="list" aria-label="할일 목록"></ul>
        <div class="empty-state" id="empty-state" aria-live="polite">
          <span class="empty-state__icon" aria-hidden="true">✓</span>
          <p>할 일이 없습니다. 새로운 할 일을 추가해보세요!</p>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
